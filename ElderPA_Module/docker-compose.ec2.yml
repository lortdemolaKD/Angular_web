# EC2 overlay: add nginx, serve app+API on port 80 (single URL)
# Usage: docker compose -f docker-compose.yml -f docker-compose.ec2.yml up -d --build
# Set DOMAIN in .env or leave unset (nginx accepts any host).

services:
  app:
    ports: []
    environment:
      # Leave API_URL unset so frontend uses same origin; nginx proxies /api to the API
      - API_URL=

  api:
    ports: []

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - api
    restart: unless-stopped

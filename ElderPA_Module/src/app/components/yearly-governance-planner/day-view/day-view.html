<div class="context-backdrop" *ngIf="menuOpen" (click)="closeMenu()" (contextmenu)="$event.preventDefault(); closeMenu()"></div>
<div
  class="context-menu"
  *ngIf="menuOpen"
  [style.left.px]="menuX"
  [style.top.px]="menuY"
  role="menu"
>
  <button
    type="button"
    class="context-menu__item"
    *ngFor="let e of menuEvents"
    (click)="onOpenAudit(e)"
    role="menuitem"
    [title]="e.title"
  >
    Open audit: {{ e.title }}
  </button>
  <div class="context-menu__empty" *ngIf="menuEvents.length === 0">No audits found.</div>
</div>

<div class="day-view">
  <div class="hour-row" *ngFor="let hour of hours">
    <div class="hour-label">{{ hour }}:00</div>
    <div class="events">
      <ng-container *ngFor="let event of dayEvents">
        <div class="event"
             *ngIf="moment(event.start).hour() === hour"
             [style.background]="event.color?.primary"
             (contextmenu)="onEventContextMenu($event, event)"
             (click)="onEventContextMenu($event, event)">
          {{ event.title }}
        </div>
      </ng-container>
    </div>
  </div>
</div>

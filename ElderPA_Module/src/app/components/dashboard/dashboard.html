<div class="header">
  <div class="dashboard-header">
    <h2 data-walkthrough-id="home.dashboardTitle">Main dashboard with widgets</h2>
    <p class="role-badge">{{ roleLabel }}</p>
  </div>
  <div class="header-actions">
    <button
      type="button"
      class="add-widgets-btn"
      data-walkthrough-id="home.addWidgets"
      [mat-menu-trigger-for]="widgetMenu"
      aria-label="Add widgets"
    >
      <mat-icon aria-hidden="true">add_circle</mat-icon>
      <span>Add widgets</span>
    </button>
    <button
      type="button"
      class="edit-mode-toggle"
      data-walkthrough-id="home.editModeToggle"
      (click)="toggleEditMode()"
      [attr.aria-label]="editMode() ? 'Exit edit mode (widgets locked)' : 'Edit mode (move and configure widgets)'"
      [title]="editMode() ? 'Exit edit mode' : 'Edit mode'">
      <mat-icon aria-hidden="true">{{ editMode() ? 'visibility' : 'settings' }}</mat-icon>
    </button>
  </div>
  <mat-menu #widgetMenu="matMenu" class="add-widgets-menu">
    @for (widget of store.widgetsToAdd(); track widget.id) {
      <button mat-menu-item (click)="store.addWidget(widget)">{{ widget.label }}</button>
    } @empty {
      <button mat-menu-item disabled>No widgets to add</button>
    }
  </mat-menu>
</div>
@if (companyBannerUrl()) {
  <div
    class="dashboard-company-banner"
    [style.backgroundImage]="'url(' + companyBannerUrl() + ')'"
    role="img"
    [attr.aria-label]="'Organisation banner'"
  ></div>
}
<div class="dashboard-widgets" #dashboard cdkDropListGroup data-walkthrough-id="home.widgetsArea">
  @for (w of store.addedWidgets(); track w.id){
    <app-widget
      cdkDropList
      [data]="w"
      [attr.data-walkthrough-id]="'dashboard.widget.' + w.id"
      [editMode]="editMode()"
      [locations]="LocElements"
      [isAdmin]="isOrgAdmin"
      [user]="user"
      [canCreateTask]="canCreateTask"
      [companies]="ComElements"
      (cdkDropListDropped)="drop($event)"
      [cdkDropListData]="w.id"
    ></app-widget>
  }

</div>

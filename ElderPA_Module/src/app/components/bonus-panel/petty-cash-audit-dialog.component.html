<h2 mat-dialog-title>Petty cash audit</h2>
<mat-dialog-content class="petty-cash-audit-dialog__content">
  <app-form-renderer
    [template]="formTemplate()"
    [existingResponse]="existingResponse()"
    [readonly]="true"
    [showProgress]="false">
  </app-form-renderer>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="close()">Close</button>
</mat-dialog-actions>

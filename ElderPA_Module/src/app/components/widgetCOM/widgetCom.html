<div class="container mat-elevation-z3"
      cdkDrag
      cdkDragPreviewContainer="parent">
 @if (data().contentKey !== 'bar') {
   <h3 class="label"> {{data().label}}</h3>
 }
  <button mat-icon-button class="settings-button" (click)="showOptions.set(true)"><mat-icon>settings</mat-icon></button>
  <div class="widget-body">
    <ng-container [ngComponentOutlet]="data().content ?? null"
                  [ngComponentOutletInputs]="outletInputs()"/>
  </div>

  @if (showOptions()) {
    <app-wiget-options [(showOptions)]="showOptions" [(indicator)]="indicator" [(viewType)]="viewType" [data]="data()" [locations]="locations() ?? []"/>
  }
  <div *cdkDragPlaceholder></div>
</div>

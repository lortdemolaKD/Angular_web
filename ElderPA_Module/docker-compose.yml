services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - mongo
    restart: unless-stopped

  app:
    build: .
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      # URL the browser uses to reach the API (host:port when using Docker port mapping)
      - API_URL=http://localhost:3000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mongo_data:
